name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  id-token: write

jobs:
  publish-and-release:
    name: Publish and release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release tag: $TAG"
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Upgrade npm for trusted publishing
        run: npm install --global npm@^11.5.1

      - name: Validate package version
        shell: bash
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"

          if [[ "$PACKAGE_VERSION" != "${{ steps.version.outputs.version }}" ]]; then
            echo "Tag version ${{ steps.version.outputs.version }} does not match package.json version $PACKAGE_VERSION"
            exit 1
          fi

      - name: Validate changelog entry
        shell: bash
        run: |
          if ! grep -q "^## ${{ steps.version.outputs.version }} " CHANGELOG.md; then
            echo "CHANGELOG.md does not contain an entry for version ${{ steps.version.outputs.version }}"
            exit 1
          fi

      - name: Validate tag commit is on main
        shell: bash
        run: |
          git fetch origin main --depth=1

          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Tagged commit $GITHUB_SHA is not contained in origin/main"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run sanity test without external API
        run: npm test
        env:
          GEMINI_API_KEY: ''

      - name: Verify publish package contents
        run: npm publish --dry-run
        env:
          GEMINI_API_KEY: ''

      - name: Pack npm artifact
        run: npm pack

      - name: Publish to npm
        run: npm publish
        env:
          GEMINI_API_KEY: ''

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            *.tgz